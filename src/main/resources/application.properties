spring.application.name=editflowimg-backend

# =========================
# BANCO DE DADOS
# =========================
spring.datasource.url=jdbc:postgresql://localhost:5432/editflowimg
spring.datasource.username=postgres
spring.datasource.password=123456

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =========================
# UPLOAD DE ARQUIVO
# =========================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =========================
# SERVIDOR
# =========================
server.port=8080
spring.main.web-application-type=servlet

# =========================
# JWT
# =========================
jwt.secret=ZWRpdGZsb3ctaW1nLXNlY3JldC1rZXktMjAyNi0tLS0tLS0tLS0tLS0tLS0tLQ==
jwt.expiration-ms=86400000


# =========================
# OPENAI
# =========================
openai.api.key=${OPENAI_API}
openai.image.model=gpt-image-1
